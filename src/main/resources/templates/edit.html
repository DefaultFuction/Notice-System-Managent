<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Edit Notice</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Inter', sans-serif;
        background: #f0f2f5;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    .container {
        max-width: 600px;
        width: 100%;
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }
    .header {
        text-align: center;
        margin-bottom: 32px;
    }
    .header .icon {
        font-size: 48px;
        margin-bottom: 8px;
    }
    .header h1 {
        font-size: 26px;
        font-weight: 700;
        color: #1a1a2e;
    }
    .header p {
        color: #8892b0;
        font-size: 14px;
        margin-top: 4px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        font-weight: 600;
        font-size: 14px;
        color: #1a1a2e;
        margin-bottom: 6px;
    }
    .form-group label .required {
        color: #ef4444;
    }
    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e8ecf1;
        border-radius: 12px;
        font-size: 15px;
        font-family: 'Inter', sans-serif;
        transition: all 0.3s;
        background: #f8f9fb;
    }
    .form-group input:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }
    .form-group textarea {
        height: 140px;
        resize: vertical;
    }
    .form-actions {
        display: flex;
        gap: 12px;
        margin-top: 8px;
    }
    .form-actions .btn {
        flex: 1;
        padding: 14px;
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        font-family: 'Inter', sans-serif;
        text-decoration: none;
        text-align: center;
    }
    .form-actions .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    .form-actions .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }
    .form-actions .btn-secondary {
        background: #f0f2f5;
        color: #4a5568;
    }
    .form-actions .btn-secondary:hover {
        background: #e2e6ee;
    }
    .form-actions .btn-danger {
        background: #fef2f2;
        color: #ef4444;
    }
    .form-actions .btn-danger:hover {
        background: #ef4444;
        color: white;
    }
    .back-link {
        display: inline-block;
        margin-top: 16px;
        color: #8892b0;
        text-decoration: none;
        font-size: 14px;
        transition: color 0.2s;
    }
    .back-link:hover {
        color: #667eea;
    }
    @media (max-width: 640px) {
        .container { padding: 24px; }
        .form-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="icon">✏️</div>
    <h1>Edit Notice</h1>
    <p>Update your notice information</p>
  </div>
  <form action="/update" method="post">
    <input type="hidden" name="id" th:value="${notice.id}">
    <div class="form-group">
      <label>Title <span class="required">*</span></label>
      <input type="text" name="title" th:value="${notice.title}" required>
    </div>
    <div class="form-group">
      <label>Content <span class="required">*</span></label>
      <textarea name="content" required th:text="${notice.content}"></textarea>
    </div>
    <div class="form-actions">
      <a th:href="'/detail?id=' + ${notice.id}" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">💾 Update Notice</button>
      <a th:href="'/delete?id=' + ${notice.id}" class="btn btn-danger" onclick="return confirm('Delete this notice?')">🗑 Delete</a>
    </div>
  </form>
  <div style="text-align:center;">
    <a th:href="'/detail?id=' + ${notice.id}" class="back-link">← Back to Detail</a>
  </div>
</div>
</body>
</html>
